name: 🚀 Build & Deploy to VPS

on:
  push:
    branches:
      - main          # 推送到 main 分支时自动部署
  workflow_dispatch:  # 也可以在 GitHub Actions 页面手动触发

jobs:
  build-and-deploy:
    name: Build React + Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js setup ───────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install dependencies ────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build React/Vite frontend ──────────────────────────
      - name: Build frontend
        run: npm run build
        # Output → dist/assets/app.js  dist/assets/index.css

      # ── 5. Deploy to VPS via SSH ───────────────────────────────
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          # Commands run on the remote server:
          script: |
            set -e
            cd /var/www/deepayv1.001

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing Node dependencies..."
            npm ci --prefer-offline

            echo "🔨 Building frontend..."
            npm run build

            echo "🔁 Reloading PHP-FPM..."
            sudo systemctl reload php8.2-fpm || sudo systemctl reload php8.1-fpm || true

            echo "✅ Deploy complete!"

      # ── 6. Notify result ───────────────────────────────────────
      - name: Deployment summary
        if: success()
        run: |
          echo "## ✅ Deploy Successful" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
